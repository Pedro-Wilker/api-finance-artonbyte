services:
  postgres:
    image: postgres:17-alpine
    container_name: gestao_financeira_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 161011
      POSTGRES_DB: gestao_financeira
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: gestao_financeira_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata: